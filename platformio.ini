[platformio]
default_envs = retrofit
src_dir = .

[env]
build_flags =
    -std=gnu++17
    -DDEV_WIFI_SSID=\"Beeline-16\" # remove in production 
    -DDEV_WIFI_PASSWORD=\"trubataburetka\"


# pio run -t upload -e retrofit
[env:retrofit]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-0001
build_src_filter =
    +<src/main.cpp>
    +<logger.cpp>
    +<time/*.cpp>
    +<hub/*.cpp>
    +<diagnostics/*.cpp>
    
lib_deps =
    bblanchon/ArduinoJson@^6.21.0
    tzapu/WiFiManager @ ^2.0.17